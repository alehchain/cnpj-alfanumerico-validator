name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CnpjAlfanumericoValidator.sln

      - name: Build
        run: dotnet build CnpjAlfanumericoValidator.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CnpjAlfanumericoValidator.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
